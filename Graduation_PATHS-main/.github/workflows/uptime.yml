################################################################################
# PATHS — External Uptime Checks  (PATHS-185)
#
# Pings the three canonical health endpoints every 5 minutes.
# On failure, creates a GitHub Issue and (if configured) posts to Slack.
#
# Required secrets:
#   PRODUCTION_API_URL      — e.g. https://api.paths.ai
#   PRODUCTION_FRONTEND_URL — e.g. https://paths.ai
#   SLACK_WEBHOOK_URL       — optional; Slack incoming-webhook URL
################################################################################

name: Uptime checks

on:
  schedule:
    # Every 5 minutes  (GitHub Actions minimum granularity)
    - cron: "*/5 * * * *"
  workflow_dispatch:   # allow manual trigger for testing

jobs:
  uptime:
    name: "🩺 Uptime ping"
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Check backend health  (/api/v1/health)
        id: backend_health
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "${{ secrets.PRODUCTION_API_URL }}/api/v1/health")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Backend /health: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Check database health  (/api/v1/health/databases)
        id: db_health
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "${{ secrets.PRODUCTION_API_URL }}/api/v1/health/databases")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Backend /health/databases: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Check frontend  (/pricing)
        id: frontend_pricing
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "${{ secrets.PRODUCTION_FRONTEND_URL }}/pricing")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Frontend /pricing: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Check status page  (/status)
        id: status_page
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "${{ secrets.PRODUCTION_FRONTEND_URL }}/status")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Frontend /status: $STATUS"
          [ "$STATUS" = "200" ]

      # ── Aggregate: fail if any check failed ──────────────────────────────
      - name: Evaluate results
        id: evaluate
        run: |
          FAILED=0

          check() {
            local name="$1"
            local result="$2"
            if [ "$result" != "0" ]; then
              echo "❌  $name FAILED"
              FAILED=1
            else
              echo "✅  $name OK"
            fi
          }

          check "backend_health"     "${{ steps.backend_health.outcome == 'failure' && '1' || '0' }}"
          check "db_health"          "${{ steps.db_health.outcome == 'failure' && '1' || '0' }}"
          check "frontend_pricing"   "${{ steps.frontend_pricing.outcome == 'failure' && '1' || '0' }}"
          check "status_page"        "${{ steps.status_page.outcome == 'failure' && '1' || '0' }}"

          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          exit $FAILED

      # ── On failure: create a GitHub Issue ───────────────────────────────
      - name: Open incident issue
        if: failure() && steps.evaluate.outputs.failed == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Uptime check failed — ${new Date().toISOString().slice(0,16)} UTC`;
            const body = [
              '## Affected endpoints',
              '',
              '| Endpoint | Status |',
              '|---|---|',
              `| \`${process.env.PRODUCTION_API_URL}/api/v1/health\` | ${{ steps.backend_health.outputs.status }} |`,
              `| \`${process.env.PRODUCTION_API_URL}/api/v1/health/databases\` | ${{ steps.db_health.outputs.status }} |`,
              `| \`${process.env.PRODUCTION_FRONTEND_URL}/pricing\` | ${{ steps.frontend_pricing.outputs.status }} |`,
              `| \`${process.env.PRODUCTION_FRONTEND_URL}/status\` | ${{ steps.status_page.outputs.status }} |`,
              '',
              '## Action required',
              '',
              '- [ ] Verify the failure is real (not a transient blip)',
              '- [ ] Check Fly.io dashboard for the backend',
              '- [ ] Check Vercel dashboard for the frontend',
              '- [ ] Check Sentry for recent errors',
              '- [ ] Notify on-call engineer if not already aware',
              '',
              `Triggered by workflow run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            ].join('\n');

            // Don't spam — check for an open issue with the same title prefix
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident,uptime',
            });

            const open = issues.find(i => i.title.startsWith('🚨 Uptime check failed'));
            if (!open) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['incident', 'uptime'],
              });
            }
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_FRONTEND_URL: ${{ secrets.PRODUCTION_FRONTEND_URL }}

      # ── On failure: notify Slack ─────────────────────────────────────────
      - name: Slack alert
        if: failure() && steps.evaluate.outputs.failed == '1' && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": ":rotating_light: *PATHS uptime check failed*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Backend /health",       "value": "${{ steps.backend_health.outputs.status }}",   "short": true},
                  {"title": "Backend /health/databases", "value": "${{ steps.db_health.outputs.status }}",    "short": true},
                  {"title": "Frontend /pricing",     "value": "${{ steps.frontend_pricing.outputs.status }}", "short": true},
                  {"title": "Frontend /status",      "value": "${{ steps.status_page.outputs.status }}",      "short": true}
                ],
                "footer": "PATHS uptime · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
              }]
            }'

      # ── On recovery: close any open incident issue ───────────────────────
      - name: Close incident issue on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident,uptime',
            });

            for (const issue of issues) {
              if (issue.title.startsWith('🚨 Uptime check failed')) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ All uptime checks passing again as of ${new Date().toISOString().slice(0,16)} UTC. Closing.`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
              }
            }
