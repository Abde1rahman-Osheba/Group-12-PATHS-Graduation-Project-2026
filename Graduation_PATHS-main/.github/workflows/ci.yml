################################################################################
# PATHS — Continuous Integration  (PATHS-181)
#
# Jobs:
#   secrets-scan   — gitleaks; blocks everything if a secret leaks
#   backend-lint   — ruff + mypy
#   backend-test   — pytest (coverage ≥ 60 %)
#   frontend-lint  — eslint + tsc
#   frontend-test  — vitest (when tests exist)
#   frontend-build — next build + bundle-size gate (< 250 kB gz)
#   lighthouse     — Lighthouse CI on marketing pages
#   deploy-staging — on main: Fly.io backend + Vercel frontend
#
# Required secrets (set in GitHub repo settings):
#   FLY_API_TOKEN, VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_PROJECT
#   NEXT_PUBLIC_SENTRY_DSN, NEXT_PUBLIC_API_URL
################################################################################

name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

# ── Job: secrets scan ──────────────────────────────────────────────────────
jobs:
  secrets-scan:
    name: "🔐 Secrets scan (gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so gitleaks can diff all commits

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}   # optional: for org features

# ── Job: backend lint ──────────────────────────────────────────────────────
  backend-lint:
    name: "🐍 Backend lint (ruff + mypy)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff mypy

      - name: ruff check
        run: ruff check app/

      - name: ruff format check
        run: ruff format --check app/

      - name: mypy
        run: |
          pip install -r requirements.txt --quiet
          mypy app/ --ignore-missing-imports --no-error-summary || true
        # mypy is informational for now; promote to hard failure once stubs are complete

# ── Job: backend tests ─────────────────────────────────────────────────────
  backend-test:
    name: "🧪 Backend tests (pytest)"
    runs-on: ubuntu-latest
    needs: secrets-scan

    services:
      postgres:
        image: apache/age:PG16_1.5.0
        env:
          POSTGRES_USER: paths_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: paths_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U paths_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
        options: >-
          --health-cmd="curl -sf http://localhost:6333/readyz"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      DATABASE_URL: postgresql+psycopg://paths_user:ci_password@localhost:5432/paths_test
      SECRET_KEY: ci-test-secret-key-32-chars-long!
      QDRANT_URL: http://localhost:6333
      ENABLE_SCHEDULER: "false"
      SENTRY_DSN: ""
      PROMETHEUS_ENABLED: "false"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v \
            --tb=short \
            -x
        env:
          PYTHONPATH: .

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/.coverage

# ── Job: frontend lint ─────────────────────────────────────────────────────
  frontend-lint:
    name: "🟦 Frontend lint (eslint + tsc)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm --filter @paths/web lint

      - name: TypeScript check
        run: pnpm --filter @paths/web exec tsc --noEmit

# ── Job: frontend build ────────────────────────────────────────────────────
  frontend-build:
    name: "🏗️ Frontend build (next build)"
    runs-on: ubuntu-latest
    needs: [secrets-scan, frontend-lint]
    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8001' }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN || '' }}
      NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN || '' }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG || '' }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @paths/web build

      - name: Bundle size gate (< 250 kB gzip for main JS chunk)
        run: |
          MAX_KB=250
          # Largest client-side JS chunk (excluding framework chunks)
          LARGEST=$(find apps/web/.next/static/chunks -name "*.js" \
            ! -name "framework*" ! -name "polyfills*" \
            -exec gzip -c {} \; 2>/dev/null | wc -c)
          LARGEST_KB=$((LARGEST / 1024))
          echo "Largest non-framework chunk (gz): ${LARGEST_KB} kB (limit: ${MAX_KB} kB)"
          if [ "$LARGEST_KB" -gt "$MAX_KB" ]; then
            echo "❌ Bundle size exceeds ${MAX_KB} kB limit"
            exit 1
          fi
          echo "✅ Bundle size within limit"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: frontend/apps/web/.next/standalone
          retention-days: 3

# ── Job: Lighthouse CI ─────────────────────────────────────────────────────
  lighthouse:
    name: "🔦 Lighthouse CI"
    runs-on: ubuntu-latest
    needs: frontend-build
    # Only run on PRs targeting main to avoid burning minutes on every push
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: frontend/apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: frontend/apps/web/.next/standalone

      - name: Install @lhci/cli
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

# ── Job: deploy to staging ─────────────────────────────────────────────────
  deploy-staging:
    name: "🚀 Deploy to staging"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      # ── Backend → Fly.io ──────────────────────────────────────────────
      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run Alembic migrations (staging)
        run: flyctl ssh console -a paths-backend-staging -C "alembic upgrade head"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy backend to Fly.io
        run: flyctl deploy --app paths-backend-staging --remote-only
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ── Frontend → Vercel ─────────────────────────────────────────────
      - name: Deploy frontend to Vercel
        run: |
          npx vercel --token "$VERCEL_TOKEN" \
            --scope "$VERCEL_ORG_ID" \
            --yes \
            --prod
        working-directory: frontend/apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

      # ── Create Sentry release ─────────────────────────────────────────
      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: staging
          version: ${{ github.sha }}
