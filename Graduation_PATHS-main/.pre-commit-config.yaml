# pre-commit hook configuration — PATHS-182
#
# Install pre-commit:   pip install pre-commit
# Install hooks:        pre-commit install
# Run manually:         pre-commit run --all-files
#
# On every `git commit` this file runs:
#   1. gitleaks      — blocks commits containing secrets
#   2. ruff check    — Python linting (backend)
#   3. ruff format   — Python formatting check (backend)
#   4. trailing-whitespace / end-of-file — universal hygiene

repos:
  # ── Secret scanning ──────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        args: ["--config=.gitleaks.toml"]

  # ── Python (backend) ─────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ── Universal hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
        exclude: \.md$
      - id: check-yaml
        exclude: ^\.github/
      - id: check-json
        exclude: (\.vscode|node_modules|\.next)
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "main"]
