# Standalone build of the PATHS web app (Next.js).
# Build context is this workspace root so pnpm can see the lockfile.
# For the full stack (backend + infra + web) use the root docker-compose.yml.
services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the client bundle at build time — point it at wherever the
        # backend is reachable from the browser.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    container_name: paths_web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
